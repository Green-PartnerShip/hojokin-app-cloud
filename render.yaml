services:
  - type: web
    name: hojokin-app-cloud
    env: docker
    plan: starter
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLOUD_MODE
        value: "1"
      - key: PUBLIC_ACCESS
        value: "1"
      - key: AUTH_REQUIRED
        value: "1"
      - key: HOST
        value: 0.0.0.0
      - key: APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hojokin-app-db
          property: connectionString

databases:
  - name: hojokin-app-db
    plan: basic-256mb
    databaseName: hojokin_app
    user: hojokin_app_user
    ipAllowList: []
